name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python files
        run: python -m py_compile custom_components/freshpoint/*.py freshpoint_probe.py freshpoint_mqtt_bridge.py

      - name: Validate JSON files
        run: |
          python -m json.tool hacs.json >/dev/null
          python -m json.tool custom_components/freshpoint/manifest.json >/dev/null
          python -m json.tool custom_components/freshpoint/strings.json >/dev/null
          python -m json.tool custom_components/freshpoint/translations/en.json >/dev/null
